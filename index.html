<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alex AI English App</title>

<style>
body {
  font-family: Poppins, sans-serif;
  background: #F5F9FF;
  text-align: center;
}

.header {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  font-weight: bold;
}

button {
  margin: 10px;
  padding: 12px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(45deg,#1CB0F6,#6C5CE7);
  color: white;
  cursor: pointer;
}

.screen {
  display: none;
}
.active {
  display: block;
}

.progress-bar {
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  margin: 20px;
}
#progress {
  height: 10px;
  background: #1CB0F6;
  width: 0%;
}

.chat-box {
  height: 300px;
  background: white;
  margin: 20px;
  padding: 10px;
  overflow-y: auto;
  border-radius: 15px;
}

.alex {
  background:#EAF4FF;
  padding:10px;
  margin:5px;
  border-radius:10px;
  text-align:left;
}

.user {
  background:#1CB0F6;
  color:white;
  padding:10px;
  margin:5px;
  border-radius:10px;
  text-align:right;
}

.input-bar {
  display: flex;
  justify-content: center;
}
input {
  padding:10px;
  width:60%;
  border-radius:10px;
  border:1px solid #ccc;
}
</style>

</head>
<body>

<div class="header">
  <div>🔥 5</div>
  <div>⭐ <span id="xp">0</span> XP</div>
  <div>🏆 Level <span id="level">1</span></div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
  <h2>Choose Unit</h2>
  <div id="units"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="progress-bar"><div id="progress"></div></div>
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <div id="chatBox" class="chat-box"></div>
  <div class="input-bar">
    <input id="userInput" placeholder="Type here...">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <h2>🎉 Lesson Complete!</h2>
  <p id="finalXP"></p>
  <button onclick="goHome()">Back Home</button>
</div>

<script>
// ===== DATA =====
const units = [
  "All About Me","Our Homes","My Foreign Friends","Our Free Time Activities",
  "My Future Job","Our School Rooms","Our Favourite School Activities",
  "In Our Classroom","Our Outdoor Activities","Our School Trip",
  "Family Time","Our Tet Holiday","Our Special Day",
  "Staying Healthy","Our Health","Seasons and the Weather",
  "Stories for Children","Means of Transport",
  "Places of Interest","Our Summer Holidays"
];

const questions = [
  {
    question: "What’s your name?",
    options: ["My name is Mai", "I name Mai", "Name Mai"],
    answer: 0
  },
  {
    question: "Where do you live?",
    options: ["I live in Da Nang", "I living Da Nang", "Live Da Nang"],
    answer: 0
  }
];

// ===== VARIABLES =====
let xp = 0;
let level = 1;
let current = 0;

// ===== INIT =====
function init(){
  let unitDiv = document.getElementById("units");
  units.forEach((u,i)=>{
    let btn=document.createElement("button");
    btn.innerText="Unit "+(i+1)+": "+u;
    btn.onclick=startQuiz;
    unitDiv.appendChild(btn);
  });
}
init();

// ===== SCREEN =====
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ===== QUIZ =====
function startQuiz(){
  current=0;
  loadQuestion();
  showScreen("quiz");
}

function loadQuestion(){
  let q=questions[current];
  document.getElementById("question").innerText=q.question;

  let ans=document.getElementById("answers");
  ans.innerHTML="";

  q.options.forEach((o,i)=>{
    let b=document.createElement("button");
    b.innerText=o;
    b.onclick=()=>checkAnswer(i);
    ans.appendChild(b);
  });

  document.getElementById("progress").style.width =
    ((current/questions.length)*100)+"%";
}

function checkAnswer(i){
  if(i===questions[current].answer){
    xp+=10;
    if(xp>=50) level=2;
    document.getElementById("xp").innerText=xp;
    document.getElementById("level").innerText=level;
  }

  current++;

  if(current<questions.length){
    loadQuestion();
  } else {
    startChat();
  }
}

// ===== CHAT =====
function startChat(){
  showScreen("chat");
  addAlex("Hi! Can you tell me about yourself?");
}

function sendMessage(){
  let input=document.getElementById("userInput");
  let text=input.value;
  if(!text) return;

  addUser(text);
  input.value="";

  setTimeout(()=>{
    addAlex("Nice! Where do you live?");
  },800);

  setTimeout(()=>{
    showResult();
  },3000);
}

function addAlex(t){
  let d=document.createElement("div");
  d.className="alex";
  d.innerText=t;
  document.getElementById("chatBox").appendChild(d);
}

function addUser(t){
  let d=document.createElement("div");
  d.className="user";
  d.innerText=t;
  document.getElementById("chatBox").appendChild(d);
}

// ===== RESULT =====
function showResult(){
  document.getElementById("finalXP").innerText="XP: "+xp;
  showScreen("result");
}

function goHome(){
  showScreen("home");
}
</script>

</body>
</html>
